---
############################################
#          KUBERNETES DEPLOY FULLSTACK
############################################
- name: Deploy to Kubernetes
  hosts: kubernetes
  become: true
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  tasks:

    # ============ NAMESPACE ============
    - name: Apply Namespace
      command: kubectl apply -f namespace.yaml

    # ============ STORAGE (une seule fois) ============
    - name: Apply MySQL Storage (PV + PVC)
      command: kubectl apply -f database/mysql-storage.yaml

    # ============ SECRET ============
    - name: Apply MySQL Secret
      command: kubectl apply -f database/mysql-secret.yaml

    # ============ MYSQL ============
    - name: Apply MySQL Deployment
      command: kubectl apply -f database/mysql-deployment.yaml

    - name: Wait for MySQL to be ready
      command: kubectl rollout status deployment/mysql -n my-app --timeout=120s
      register: mysql_status
      retries: 3
      delay: 10
      until: mysql_status.rc == 0

    - name: Extra wait for MySQL to initialize
      pause:
        seconds: 20

    # ============ BACKEND ============
    - name: Delete Backend Deployment (force recreate)
      command: kubectl delete deployment backend -n my-app --ignore-not-found=true

    - name: Apply Backend Deployment
      command: kubectl apply -f backend-souhir/backenddeploy.yaml

    - name: Wait for Backend to be ready
      command: kubectl rollout status deployment/backend -n my-app --timeout=120s
      register: backend_status
      retries: 3
      delay: 10
      until: backend_status.rc == 0

    # ============ FRONTEND ============
    - name: Delete Frontend Deployment (force recreate)
      command: kubectl delete deployment frontend -n my-app --ignore-not-found=true

    - name: Apply Frontend Deployment
      command: kubectl apply -f /tmp/frontend-souhir/frontdeploy.yaml

    - name: Wait for Frontend to be ready
      command: kubectl rollout status deployment/frontend -n my-app --timeout=60s

    # ============ INGRESS ============
    - name: Apply Ingress
      command: kubectl apply -f ingress.yaml

    # ============ VERIFICATION FINALE ============
    - name: Show all pods status
      command: kubectl get pods -n my-app
      register: pods_output

    - name: Print pods status
      debug:
        msg: "{{ pods_output.stdout }}"
