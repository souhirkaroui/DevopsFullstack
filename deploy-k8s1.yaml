############################################
#          KUBERNETES DEPLOY FULLSTACK
############################################
- name: Deploy Fullstack Application to Kubernetes
  hosts: localhost
  become: true
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

  tasks:

    # Namespace
    - name: Apply Namespace
      command: kubectl apply -f namespace.yaml

    # Database
    - name: Delete existing MySQL resources (ignore if not exists)
      command: |
        kubectl delete -f database/mysql-deployment.yaml --ignore-not-found=true
        kubectl delete -f database/mysql-storage.yaml --ignore-not-found=true
        kubectl delete -f database/mysql-secret.yaml --ignore-not-found=true

    - name: Apply MySQL Secret
      command: kubectl apply -f database/mysql-secret.yaml

    - name: Apply MySQL Storage
      command: kubectl apply -f database/mysql-storage.yaml

    - name: Apply MySQL Deployment
      command: kubectl apply -f database/mysql-deployment.yaml

    # Backend
    - name: Delete existing Backend Deployment and Service
      command: |
        kubectl delete deployment backend-deploy --ignore-not-found=true
        kubectl delete service backend-svc --ignore-not-found=true

    - name: Apply Backend Deployment
      command: kubectl apply -f backend-souhir/backenddeploy.yaml

    # Frontend
    - name: Delete existing Frontend Deployment and Service
      command: |
        kubectl delete deployment frontend-deploy --ignore-not-found=true
        kubectl delete service frontend-svc --ignore-not-found=true

    - name: Apply Frontend Deployment
      command: kubectl apply -f frontend-souhir/frontdeploy.yaml

    # Ingress
    - name: Delete existing Ingress (ignore if not exists)
      command: kubectl delete -f ingress.yaml --ignore-not-found=true

    - name: Apply Ingress
      command: kubectl apply -f ingress.yaml
