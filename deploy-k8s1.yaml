---
############################################
#          KUBERNETES DEPLOY FULLSTACK
############################################

- name: Deploy to Kubernetes
  hosts: kubernetes
  become: true
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

  tasks:

    # Copy all Kubernetes manifests
    - name: Copy manifests
      copy:
        src: "{{ item }}"
        dest: /tmp/
      loop:
        - namespace.yaml
        - ingress.yaml
        - database/
        - backend-souhir/
        - frontend-souhir/

    # Namespace
    - name: Apply Namespace
      command: kubectl apply -f /tmp/namespace.yaml

    # Delete all deployments in namespace
    - name: Delete all deployments
      command: kubectl delete deployment --all -n my-app --ignore-not-found=true

    # Database resources
    - name: Delete MySQL Secret
      command: kubectl delete -f /tmp/database/mysql-secret.yaml --ignore-not-found=true

    - name: Delete MySQL Storage
      command: kubectl delete -f /tmp/database/mysql-storage.yaml --ignore-not-found=true

    - name: Delete MySQL Deployment
      command: kubectl delete -f /tmp/database/mysql-deployment.yaml --ignore-not-found=true

    - name: Apply MySQL Secret
      command: kubectl apply -f /tmp/database/mysql-secret.yaml

    - name: Apply MySQL Storage
      command: kubectl apply -f /tmp/database/mysql-storage.yaml

    - name: Apply MySQL Deployment
      command: kubectl apply -f /tmp/database/mysql-deployment.yaml

    # Backend resources
    - name: Delete Backend Deployment
      command: kubectl delete deployment backend-deploy --ignore-not-found=true

    - name: Delete Backend Service
      command: kubectl delete service backendsvc --ignore-not-found=true

    - name: Apply Backend Deployment
      command: kubectl apply -f /tmp/backend-souhir/backenddeploy.yaml

    # Frontend resources
    - name: Delete Frontend Deployment
      command: kubectl delete deployment frontend-deploy --ignore-not-found=true

    - name: Delete Frontend Service
      command: kubectl delete service frontsvc --ignore-not-found=true

    - name: Apply Frontend Deployment
      command: kubectl apply -f /tmp/frontend-souhir/frontdeploy.yaml

    # Ingress
    - name: Delete Ingress
      command: kubectl delete -f /tmp/ingress.yaml --ignore-not-found=true

    - name: Apply Ingress
      command: kubectl apply -f /tmp/ingress.yaml
