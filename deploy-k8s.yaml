############################################
# Deploy Fullstack Application to Kubernetes
############################################

- name: Deploy Fullstack Application to Kubernetes
  hosts: kubernetes
  become: true
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

  vars:
    kubeconfig_path: "{{ lookup('env','KUBECONFIG') }}"
    namespace_file: "namespace.yaml"
    db_path: "database"
    backend_path: "backend-souhir"
    frontend_path: "frontend-souhir"
    ingress_file: "ingress.yaml"

  tasks:

    ###################################
    # Namespace
    ###################################
    - name: Apply Namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ namespace_file }}"

    ###################################
    # Delete old resources
    ###################################
    - name: Delete old Backend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        src: "{{ backend_path }}/backenddeploy.yaml"
      ignore_errors: yes

    - name: Delete old Frontend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        src: "{{ frontend_path }}/frontdeploy.yaml"
      ignore_errors: yes

    - name: Delete old Ingress
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        src: "{{ ingress_file }}"
      ignore_errors: yes

    ###################################
    # Database
    ###################################
    - name: Apply MySQL Secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-secret.yaml"

    - name: Apply MySQL Storage
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-storage.yaml"

    - name: Apply MySQL Deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-deployment.yaml"

    ###################################
    # Backend
    ###################################
    - name: Apply Backend Deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ backend_path }}/backenddeploy.yaml"

    ###################################
    # Frontend
    ###################################
    - name: Apply Frontend Deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ frontend_path }}/frontdeploy.yaml"

    ###################################
    # Ingress
    ###################################
    - name: Apply Ingress
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ ingress_file }}"
