---
############################################
# STEP 1 - Copy files from Jenkins to Master
############################################
- name: Copy files to MasterNode
  hosts: kubernetes
  become: true
  tasks:
    - name: Create workspace directory on MasterNode
      file:
        path: /tmp/projet-fullstack
        state: directory
        mode: '0755'

    - name: Copy all project files to MasterNode
      synchronize:
        src: /var/lib/jenkins/workspace/projet-fullstack/
        dest: /tmp/projet-fullstack/
        recursive: yes
        delete: yes

############################################
# STEP 2 - Deploy to Kubernetes
############################################
- name: Deploy Fullstack Application to Kubernetes
  hosts: kubernetes
  become: true
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  vars:
    kubeconfig_path: "/home/ubuntu/.kube/config"
    workspace: "/tmp/projet-fullstack"
    db_path: "{{ workspace }}/database"
    backend_path: "{{ workspace }}/backend-souhir"
    frontend_path: "{{ workspace }}/frontend-souhir"
    image_tag: "{{ image_tag }}"

  tasks:

    ###################################
    # Namespace
    ###################################
    - name: Apply Namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ workspace }}/namespace.yaml"

    ###################################
    # Secret MySQL
    ###################################
    - name: Apply MySQL Secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-secret.yaml"

    ###################################
    # Storage MySQL (jamais supprimé)
    ###################################
    - name: Apply MySQL Storage
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-storage.yaml"

    ###################################
    # MySQL Deployment
    ###################################
    - name: Apply MySQL Deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-deployment.yaml"

    - name: Wait for MySQL to be ready
      command: >
        kubectl rollout status deployment/mysql
        -n my-app --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      retries: 3
      delay: 10
      register: mysql_status
      until: mysql_status.rc == 0

    - name: Extra wait for MySQL initialization
      pause:
        seconds: 15

    ###################################
    # Backend (image_tag dynamique)
    ###################################
    - name: Deploy Backend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('template', backend_path + '/backenddeploy.yaml') }}"

    - name: Wait for Backend to be ready
      command: >
        kubectl rollout status deployment/backend
        -n my-app --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      retries: 3
      delay: 10
      register: backend_status
      until: backend_status.rc == 0

    ###################################
    # Frontend (image_tag dynamique)
    ###################################
    - name: Deploy Frontend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('template', frontend_path + '/frontdeploy.yaml') }}"

    - name: Wait for Frontend to be ready
      command: >
        kubectl rollout status deployment/frontend
        -n my-app --timeout=60s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    ###################################
    # Ingress (jamais supprimé)
    ###################################
    - name: Apply Ingress
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ workspace }}/ingress.yaml"

    ###################################
    # Vérification finale
    ###################################
    - name: Get all pods status
      command: kubectl get pods -n my-app
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: pods_output

    - name: Print pods status
      debug:
        msg: "{{ pods_output.stdout }}"
