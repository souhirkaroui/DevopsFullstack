############################################
# Deploy Fullstack Application to Kubernetes
############################################

- name: Deploy Fullstack Application to Kubernetes
  hosts: kubernetes
  become: true

  vars:
    # Chemin fixe vers le kubeconfig lisible par Jenkins
    kubeconfig_path: /home/ubuntu/.kube/config

    # Fichiers et chemins relatifs au playbook
    namespace_file: "{{ playbook_dir }}/namespace.yaml"
    db_path: "{{ playbook_dir }}/database"
    backend_path: "{{ playbook_dir }}/backend-souhir"
    frontend_path: "{{ playbook_dir }}/frontend-souhir"
    ingress_file: "{{ playbook_dir }}/ingress.yaml"

    # Tag de l'image Docker passé depuis Jenkins
    image_tag: "{{ image_tag }}"

  tasks:

    ###################################
    # Namespace
    ###################################
    - name: Apply Namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ namespace_file }}"

    ###################################
    # Database
    ###################################
    - name: Apply MySQL Secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-secret.yaml"

    - name: Apply MySQL Storage
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-storage.yaml"

    - name: Apply MySQL Deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ db_path }}/mysql-deployment.yaml"

    ###################################
    # Backend (avec image_tag)
    ###################################
    - name: Deploy Backend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('template', backend_path + '/backenddeploy.yaml') }}"

    ###################################
    # Frontend (avec image_tag)
    ###################################
    - name: Deploy Frontend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('template', frontend_path + '/frontdeploy.yaml') }}"

    ###################################
    # Ingress
    ###################################
    - name: Apply Ingress
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: "{{ ingress_file }}"
