---
- name: Deploy Fullstack Application to Kubernetes
  hosts: kubernetes
  become: true
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config
  vars:
    kubeconfig_path: "/var/lib/jenkins/.kube/config"
    image_tag: "{{ image_tag }}"
  tasks:

    - name: Apply MySQL Secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: k8s/mysql-secret.yaml

    - name: Apply MySQL PV
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: k8s/mysql-pv.yaml

    - name: Apply MySQL PVC
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: k8s/mysql-pvc.yaml

    - name: Apply MySQL Deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: k8s/mysql-deployment.yaml

    - name: Wait for MySQL to be ready
      command: >
        kubectl rollout status deployment/mysql --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      retries: 3
      delay: 10
      register: mysql_status
      until: mysql_status.rc == 0

    - name: Extra wait for MySQL initialization
      pause:
        seconds: 15

    - name: Deploy Backend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('template', 'k8s/deployment-backend.yaml') }}"

    - name: Wait for Backend to be ready
      command: >
        kubectl rollout status deployment/backend --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      retries: 3
      delay: 10
      register: backend_status
      until: backend_status.rc == 0

    - name: Deploy Frontend
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('template', 'k8s/deployment-front.yaml') }}"

    - name: Wait for Frontend to be ready
      command: >
        kubectl rollout status deployment/frontend --timeout=60s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Apply Ingress
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        src: k8s/ingress.yaml

    - name: Get all pods status
      command: kubectl get pods
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: pods_output

    - name: Print pods status
      debug:
        msg: "{{ pods_output.stdout }}"


































---
- name: Deploy Fullstack Application to Kubernetes
  hosts: kubernetes
  become: true

  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

  tasks:

    # ===============================
    # Copier les manifests Kubernetes
    # ===============================
    - name: Copy Kubernetes manifests
      copy:
        src: "{{ playbook_dir }}/"
        dest: /home/ubuntu/k8s-manifests/
        mode: '0755'

    # ===============================
    # Namespace
    # ===============================
    - name: Create namespace
      command: kubectl apply -f /home/ubuntu/k8s-manifests/namespace.yaml

    # ===============================
    # Database
    # ===============================
    - name: Deploy MySQL Secret
      command: kubectl apply -f /home/ubuntu/k8s-manifests/database/mysql-secret.yaml

    - name: Deploy MySQL Storage
      command: kubectl apply -f /home/ubuntu/k8s-manifests/database/mysql-storage.yaml

    - name: Deploy MySQL Deployment
      command: kubectl apply -f /home/ubuntu/k8s-manifests/database/mysql-deployment.yaml

    - name: Wait MySQL Ready
      command: kubectl rollout status deployment/mysql --timeout=120s -n my-app

    # ===============================
    # Backend
    # ===============================
    - name: Deploy Backend
      command: kubectl apply -f /home/ubuntu/k8s-manifests/backend-souhir/backenddeploy.yaml

    - name: Wait Backend Ready
      command: kubectl rollout status deployment/backend-deployment --timeout=120s -n my-app

    # ===============================
    # Frontend
    # ===============================
    - name: Deploy Frontend
      command: kubectl apply -f /home/ubuntu/k8s-manifests/frontend-souhir/frontdeploy.yaml

    - name: Wait Frontend Ready
      command: kubectl rollout status deployment/frontend-deployment --timeout=120s -n my-app

    # ===============================
    # Ingress
    # ===============================
    - name: Deploy Ingress
      command: kubectl apply -f /home/ubuntu/k8s-manifests/ingress.yaml
