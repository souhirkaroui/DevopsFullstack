apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ingress
  namespace: my-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: myapp.local
      http:
        paths:
          # Backend: tout ce qui commence par /api va vers backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backendsvc
                port:
                  number: 8080

          # Frontend: tout le reste va vers frontsvc
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontsvc
                port:
                  number: 80
