apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  namespace: my-app
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: fullstack.ghazelatech.com
      http:
        paths:
          # Backend: tout ce qui commence par /api va vers backend
          - path: /api/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: backendsvc
                port:
                  number: 8080

          # Frontend: tout le reste va vers frontsvc
          - path: /.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontsvc
                port:
                  number: 80
