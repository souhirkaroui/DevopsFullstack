apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  namespace: my-app
spec:
  ingressClassName: nginx
  rules:
  - host: fullstack.ghazelatech.com
    http:
      paths:

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backendsvc
            port:
              number: 8080

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontsvc
            port:
              number: 80
