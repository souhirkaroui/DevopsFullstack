apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ingress
  namespace: my-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: myapp.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontsvc      # <-- corrigé
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backendsvc   # <-- corrigé
                port:
                  number: 8080
