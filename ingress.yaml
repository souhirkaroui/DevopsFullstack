apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ingress
  namespace: my-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: myapp.local
      http:
        paths:
          - path: /(.*)           # frontend
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontsvc
                port:
                  number: 80
          - path: /api(/|$)(.*)   # backend
            pathType: ImplementationSpecific
            backend:
              service:
                name: backendsvc
                port:
                  number: 8080
