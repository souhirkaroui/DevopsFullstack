# -------------------- Ingress pour exposer le frontend et rediriger le backend --------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  namespace: my-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    
spec:
  rules:
    - host: fullstack.ghazelatech.com
      http:
        paths:
          # Angular frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontsvc
                port:
                  number: 80
          # API backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backendsvc
                port:
                  number: 8080
