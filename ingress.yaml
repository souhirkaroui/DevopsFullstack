apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ingress
  namespace: my-app
spec:
  ingressClassName: nginx
  rules:
    # Règle 1 : Avec le domaine myapp.local
    - host: myapp.local
      http:
        paths:
          # Backend Spring Boot (mettre AVANT le frontend)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backendsvc
                port:
                  number: 8080
          # Frontend Angular
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontsvc
                port:
                  number: 80
    
    # Règle 2 : Sans host (accepte l'IP publique)
    - http:
        paths:
          # Backend Spring Boot
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backendsvc
                port:
                  number: 8080
          # Frontend Angular
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontsvc
                port:
                  number: 80
