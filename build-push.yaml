---
- name: Build and Push Frontend & Backend Images
  hosts: localhost
  become: true

  vars:
    dockerhub_user: "{{ dockerhub_user }}"
    dockerhub_password: "{{ dockerhub_password }}"
    image_tag: "{{ lookup('env','BUILD_NUMBER') | default('latest') }}"

  tasks:

    ############################################
    # Login DockerHub
    ############################################
    - name: Login to DockerHub
      community.docker.docker_login:
        username: "{{ dockerhub_user }}"
        password: "{{ dockerhub_password }}"

    ############################################
    # FRONTEND
    ############################################
    - name: Build and push frontend image
      community.docker.docker_image:
        name: "{{ dockerhub_user }}/frontend"
        tag: "{{ image_tag }}"
        source: build
        force_source: true
        build:
          path: "./frontend-souhir"
        push: true

    - name: Tag frontend latest
      community.docker.docker_image:
        name: "{{ dockerhub_user }}/frontend"
        tag: latest
        source: local
        push: true

    ############################################
    # BACKEND
    ############################################
    - name: Build and push backend image
      community.docker.docker_image:
        name: "{{ dockerhub_user }}/backend"
        tag: "{{ image_tag }}"
        source: build
        force_source: true
        build:
          path: "./backend-souhir"
        push: true

    - name: Tag backend latest
      community.docker.docker_image:
        name: "{{ dockerhub_user }}/backend"
        tag: latest
        source: local
        push: true

    ############################################
    # Logout Docker
    ############################################
    - name: Logout Docker
      community.docker.docker_login:
        state: absent
